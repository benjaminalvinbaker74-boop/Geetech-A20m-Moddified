[gcode_macro ADAPTIVE_PURGE]
description: Dynamic prime line placed close to the active print footprint
gcode:
    {% set AMB = printer.exclude_object.bounds %}
    {% if AMB %}
        # Find the bottom-left corner of your actual sliced object footprint
        {% set x_start = [AMB[0][0] - 10, 5]|max %}
        {% set y_start = [AMB[0][1] - 10, 5]|max %}
        
        G90                                  ; Absolute positioning
        G1 X{x_start} Y{y_start} Z5 F4000     ; Move near the object corner smoothly
        G1 Z0.4 F2000                        ; Drop to layer height
        G91                                  ; Relative extrusion
        G1 X20 E10 F900                      ; Purge a 20mm thick line at a gentler 15mm/s
        G1 Y2 F900                           ; Quick sideways wipe step
        G1 X-10 E-0.2 F900                   ; Retract slightly and wipe back
        G90                                  ; Back to absolute
        G92 E0                               ; Reset extruder axis
    {% else %}
        # Fallback to standard bed corner if no object layout is supplied
        G90
        G1 X10 Y10 Z0.4 F4000
        G91
        G1 X50 E15 F900
        G90
        G92 E0
    {% endif %}