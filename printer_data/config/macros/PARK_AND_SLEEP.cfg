[gcode_macro PARK_AND_SLEEP]
gcode:
    {% if printer.pause_resume.is_paused %}
        M117 Already paused. Sleeping heaters...
    {% else %}
        M117 Pausing print for sleep...
        PAUSE
    {% endif %}
    
    # Turn off heaters safely
    M104 S0 ; Turn off hotend
    M140 S0 ; Turn off bed
    
    # Optional: Turn off part cooling fan
    M106 S0
    
    M117 Printer asleep. Keep power ON!