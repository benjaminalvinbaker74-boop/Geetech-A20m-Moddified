[gcode_macro WAKE_AND_RESUME]
gcode:
    {% set target_extruder = printer.pause_resume.target_extruder|default(200)|float %}
    {% set target_bed = printer.pause_resume.target_bed|default(60)|float %}
    
    # Check if a print is actually paused
    {% if printer.pause_resume.is_paused %}
        M117 Heating up for resume...
        
        # Start heating both simultaneously
        M140 S{target_bed}
        M104 S{target_extruder}
        
        # Wait for them to reach temperature
        M190 S{target_bed}
        M109 S{target_extruder}
        
        M117 Resuming print...
        RESUME
    {% else %}
        M117 No active paused print to resume!
    {% endif %}
