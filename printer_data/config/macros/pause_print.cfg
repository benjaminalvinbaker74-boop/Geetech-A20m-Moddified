[gcode_macro PAUSE_PRINT]
rename_existing: BASE_PAUSE
gcode:
    # 1. Grab current print head coordinates
    {% set x_park = 10.0 %}                  ; Safe left-side parking position
    {% set y_park = 200.0 %}                 ; Safe rear parking position
    {% set z_lift = 10.0 %}                  ; Amount to lift nozzle up
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    
    # 2. Calculate safe Z lift clearance
    {% if act_z < (max_z - z_lift) %}
        {% set z_safe = z_lift %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    
    # 3. Save state, lift, retract, and park safely away from edges
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91                                      ; Relative movement
    G1 E-1.0 F2100                           ; Retract 1mm to prevent ooze
    G1 Z{z_safe} F900                        ; Lift nozzle safely
    G90                                      ; Absolute movement
    G1 X{x_park} Y{y_park} F6000             ; Fly to safe parking coordinates
    
