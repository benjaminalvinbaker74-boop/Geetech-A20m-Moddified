[gcode_macro LOAD_FILAMENT]
gcode:
   M104 S190                      ; Heat the hotend to a safe temp
   M109 S190                      ; Wait for hotend temp
   G91                            ; Relative positioning
   G1 E150 F2000                  ; Step 1: Fast feed (Klipper chunk 1)
   G1 E150 F2000                  ; Step 2: Fast feed (Klipper chunk 2)
   G1 E100 F2000                  ; Step 3: Fast feed (Klipper chunk 3)
   G1 E30 F200                    ; Step 4: Slow prime through mixing zone
   G90                            ; Absolute positioning
