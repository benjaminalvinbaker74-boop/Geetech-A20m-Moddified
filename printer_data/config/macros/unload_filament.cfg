[gcode_macro UNLOAD_FILAMENT]
gcode:
   M104 S210                      ; Heat hotend
   M109 S210                      ; Wait for hotend
   G91                            ; Relative positioning
   G1 E5 F300                     ; Extrude a tiny bit first to clear the tip
   G1 E-50 F3000                  ; Fast snap retract out of mixing chamber
   G1 E-150 F4000                 ; Fast pull out of Bowden tube
   G1 E-150 F4000                 ; Fast pull out of Bowden tube
   G1 E-80 F4000                  ; Clear of the extruder gears
   G90                            ; Absolute positioning
