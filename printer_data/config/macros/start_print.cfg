[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    
    M117 Heating bed...
    M190 S{BED_TEMP}             # Heat bed and wait
    
    M117 Homing and Leveling...
    G28                          # Home all axes
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE           # Create a fresh BLTouch mesh
    G1 Z5 F3000                  # Lift nozzle
    
    M117 Heating hotend...
    M109 S{EXTRUDER_TEMP}        # Heat nozzle and wait
    
    # Default to 100% Extruder 0 to start
    ACTIVATE_E0
    
    M117 Purging...

 	LINE_PURGE   
    # G92 E0                       # Reset Extruder
    # G1 X5 Y10 Z0.3 F5000.0       # Move to start position
    # G1 X5 Y200.0 Z0.3 F1500.0 E15 # Draw the first line
    # G1 X5.5 Y200.0 Z0.3 F5000.0  # Move to side slightly
    # G1 X5.5 Y10 Z0.3 F1500.0 E30 # Draw the second line
    # G92 E0                       # Reset Extruder
    M117 Printing...
