[gcode_macro SMART_PARK]
description: Safely hovers near the upcoming print footprint while the hotend finishes heating
gcode:
    {% set AMB = printer.exclude_object.bounds %}
    {% if AMB %}
        # Calculate a location just slightly off the start corner of your object
        {% set x_park = [AMB[0][0] - 10, 5]|max %}
        {% set y_park = [AMB[0][1] - 10, 5]|max %}
        
        G90 ; Absolute positioning
        G1 X{x_park} Y{y_park} Z10 F4000 ; Fly over to the print zone and hover at Z10
    {% else %}
        # Fallback to standard front corner if no object metadata is found
        G90
        G1 X10 Y10 Z10 F4000
    {% endif %}