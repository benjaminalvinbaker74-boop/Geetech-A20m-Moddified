sensor_type: temperature_host
#sensor_path: /sys/class/thermal/thermal_zone0/temp

[exclude_object]


[include KAMP_Settings.cfg]


[printer]
kinematics: cartesian
max_velocity: 400
max_accel: 500
max_z_velocity: 10
max_z_accel: 100


