# This file contains common pin mappings for the BIGTREETECH SKR V1.4
# board. To use this config, the firmware should be compiled for the
# LPC1768 or LPC1769(Turbo).

# See docs/Config_Reference.md for a description of parameters.

### Include macros
[include mainsail.cfg]
[include macros/cancel.cfg]
[include macros/start_print.cfg]
[include macros/end_print.cfg]
[include macros/bltouch.cfg]
[include macros/pause_print.cfg]
[include macros/clean_nozzle.cfg]
#[include macros/.cfg]
[include macros/PARK_AND_SLEEP.cfg]
[include macros/WAKE_AND_RESUME.cfg]
[include macros/bed_heat_60.cfg]

[axis_twist_compensation]
 speed: 50
#   The speed (in mm/s) of non-probing moves during calibration.
#   The default is 50.
 horizontal_move_z: 5
#   The distance (in mm) that the Z axis is lifted above the bed before
#   a probing move. The default is 5.

# --- X-AXIS CALIBRATION PATH ---
calibrate_start_x: 25
#   Safely clear of the front-left and back-left corner clips.
calibrate_end_x: 225
#   Safely stops before hitting the front-right and back-right corner clips
calibrate_x: 129 # 127 seems not dead centre
#   The absolute center of your X

# --- Y-AXIS CALIBRATION PATH ---
calibrate_start_y: 25
#   Safely clear of the front-left and front-right corner clips.
calibrate_y: 127 
#   The absolute center of your Y-axis (255 / 2), avoiding the side clips completely.
calibrate_end_y: 220
#   Safely stops before hitting the back-left and back-right corner clips.
#-axis (255 / 2), keeping the toolhead centered.

[firmware_retraction]
retract_length: 1.8 #2      ; Your quiet direct-drive length (use 4.0 if Bowden)  2mm@20mm/s 3mm@30mm/s 4mm@40 mm/s
retract_speed: 20           ; Your tuned safe, quiet speed
unretract_extra_length: 0.2   ; No extra push needed
unretract_speed: 25         ; Matching prime speed




[gcode_macro _KAMP_Settings]
variable_verbose_enable: True       ; Prints status updates to the Klipper console
variable_purge_height: 0.28        ; Z-height for the purge lines
variable_tip_distance: 0.0          ; How far filament retracts between prints (keep at 0)
variable_purge_margin: 20.0         ; Distance (mm) between the purge logo and your object
variable_purge_amount: 35.0         ; Total amount of filament to dump into the logo
variable_flow_rate: 12          ; Flow rate speed during the purge (scaled down safely for you)
gcode:
    # Leave empty, this block just holds the settings above!



[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT


[stepper_x]
step_pin: P2.2
dir_pin: P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 40
endstop_pin: !P1.29
position_endstop: 0
position_max: 265
homing_speed: 50

[stepper_y]
step_pin: P0.19
dir_pin: P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 40
endstop_pin: !P1.28
position_endstop: 0
position_max: 255
homing_speed: 50

[stepper_z]
step_pin: P0.22
dir_pin: !P2.11
enable_pin: !P0.21
microsteps: 16
rotation_distance: 8
#endstop_pin: !P1.27
position_endstop: 0.0
#position_max: 300
position_min: -1
position_max: 250
endstop_pin: probe:z_virtual_endstop 230
homing_speed: 10.0
homing_retract_dist: 5.0


